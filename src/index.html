<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css" />
    <script
      src="https://kit.fontawesome.com/8c107287f6.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-[#B8E6FE]">
    <div class=" min-h-screen py-20 px-6 m-32">
      <div class="flex justify-between items-end px-20 py-4">
        <div class="font-extrabold text-4xl text-[#000000] mb-4">Task List</div>
        <div class="flex justify-center">
  <button type="button" data-toggle="modal" data-target="#exampleModalMessage" class="inline-flex border font-sans font-medium text-center transition-all duration-300 ease-in disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed data-[shape=pill]:rounded-full data-[width=full]:w-full focus:shadow-none text-sm rounded-[20px] py-2 px-4 shadow-sm hover:shadow-md bg-[purple] text-slate-50 "> Add Task </button>
  <div class="fixed antialiased inset-0 bg-slate-950/50 flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-300 ease-out z-[9999]" id="exampleModalMessage" aria-hidden="true">
    <div class="bg-white rounded-xl shadow-2xl shadow-slate-950/5 w-9/12 sm:w-7/12 md:w-5/12 lg:w-3/12 scale-95 transition-transform duration-300 ease-out">
      <div class="p-4 flex justify-between items-start">
        <div class="flex flex-col">
          <h1 class="text-lg text-slate-800 font-bold">Add Task</h1>
        </div>
      </div>
      <form action="#">
        <div class="p-4 text-slate-500">
          <div>
            <p class=" text-black font-bold">Task</p>
            <div class="relative w-full">
              <input id="inputBox" type="text" class="w-70 aria-disabled:cursor-not-allowed outline-2 outline-offset-2 outline-[#51A2FF] rounded-[10px] text-slate-800"/>
            </div>
          </div>
          <div class="space-y-1.5">
            <label for="priority" class="text-sm text-black dark:text-white font-bold mb-2">Priority</label>
            <div class="p-2 flex gap-5">
              <button type="button" onclick="setPriority('High')" class="bg-white text-[#E7180B] outline-2 outline-offset-2 outline-[#E7180B] px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[red] focus:bg-[red] focus:text-[white] hover:text-[white] transition">
                High
              </button>
              <button type="button" onclick="setPriority('Medium')" class="bg-white text-[orange] outline-2 outline-offset-2 outline-orange-500 px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[orange] focus:bg-[orange] focus:text-[white] hover:text-[white] transition">
                Medium
              </button>
              <button type="button" onclick="setPriority('Low')" class="bg-white text-[green] outline-2 outline-offset-2 outline-green-500 px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[green] focus:bg-[green] focus:text-[white] hover:text-[white] transition">
                Low
              </button>
            </div>
          </div>
          <div class="space-y-1.5">
            <label for="priority" class="text-sm text-black dark:text-white font-bold mb-2">Status</label>
            <div class="p-2 flex gap-5">
              <button type="button" onclick="setStatus('To Do')" class="bg-white text-[#51A2FF] outline-2 outline-offset-2 outline-[#51A2FF] px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[#51A2FF] focus:bg-[#51A2FF] focus:text-[white] hover:text-[white] transition">
                To Do
              </button>
              <button type="button" onclick="setStatus('Progress')" class="bg-white text-[#51A2FF] outline-2 outline-offset-2 outline-[#51A2FF] px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[#51A2FF] focus:bg-[#51A2FF] focus:text-[white] hover:text-[white] transition">
                Progress
              </button>
              <button type="button" onclick="setStatus('Done')" class="bg-white text-[#51A2FF] outline-2 outline-offset-2 outline-[#51A2FF] px-6 py-1.25 rounded-[15px] font-semibold flex items-center gap-2 hover:bg-[#51A2FF] focus:bg-[#51A2FF] focus:text-[white] hover:text-[white] transition">
                Done
              </button>
            </div>
          </div>
        </div>
        <div class="p-4 pt-0 flex justify-between items-center gap-2">
          <button type="button" data-dismiss="modal" class="inline-flex border"></button>
          <button id="addBtn" type="button" onclick="addTask()" class="inline-flex border  font-medium text-center transition-all duration-300 ease-in disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed data-[shape=pill]:rounded-full data-[width=full]:w-full focus:shadow-none text-sm rounded-[10px] py-2 px-6 shadow-sm hover:shadow-md bg-purple-500 text-white">Add</button>
        </div>
      </form>
    </div>
  </div>
</div>
      </div>
      <div
        class="bg-[#FFFFFF] rounded-[40px] py-5 px-8 flex flex-wrap items-center gap-8 shadow-lg mt-8"
      >
        <div
          class="flex justify-between gap-4 font-extrabold text-2xl text-[#00FFFF] w-full"
        >
          <p>Task List</p>
          <p>Priority</p>
          <p>Status</p>
          <p class="text-[orange]">Actions</p>
        </div>
      </div>
       <div
        class="bg-[#FFFFFF] rounded-[20px] py-8 px-6 flex flex-wrap justify-around items-center gap-8 shadow-lg mt-8"
      >
        <div class="flex justify-between gap-4 font-extrabold text-2xl w-full">
          <p>Java Project</p>
          <p class="text-[green]">Low</p>
          <p>Progress</p>
          <div class="gap-8">
            <a href="" class="text-[blue]"
              ><i class="fa-regular fa-pen-to-square"></i
            ></a>
            <a href="" class="text-[red]"
              ><i class="fa-regular fa-trash-can"></i
            ></a>
          </div>
        </div>
      </div>
      <div id="taskList">
      </div>
    </div>
    <script
      src="https://unpkg.com/@material-tailwind/html@3.0.0-beta.7/dist/material-tailwind.umd.min.js"
      defer
    ></script>
    <script src="/src/script.js"></script>
  </body>
</html>
